- title: "Vision-Language Models, MLLMs, and Agentic Visual Perception"
  summary: "Multimodal LLMs may rely on language priors rather than pertinent visual evidence, especially on long documents. I explore agentic perception frameworks that gather evidence iteratively to improve accuracy and efficiency."
  works:
    - title: "InSight-doc: Agentic Visual Perception for Long-Document Understanding"
      venue: "In submission, 2026"
      description: "Replaces fixed-resolution, single-pass pipelines with iterative perception that selectively acquires high-resolution crops on demand."
      note: "Paper, code, and data will be publicly available soon."

- title: "Controllable Image Editing and Generation"
  summary: "Controllable editing requires precise spatial and semantic guidance without costly retraining. I develop training-free methods that combine structural control with flexible prompt guidance."
  works:
    - title: "CannyEdit: Selective Canny Control and Dual-Prompt Guidance for Training-Free Image Editing"
      venue: "IEEE CAI, 2026"
      description: "Enables selective edge-based structural control with dual-prompt guidance for training-free, controllable image editing."
      paper: "https://arxiv.org/abs/2508.06937"
      code: "https://github.com/vaynexie/CannyEdit"

- title: "Robustness, Domain Generalization, and Adaptation"
  summary: "Foundation models can lose robustness during fine-tuning and fail under distribution shift. I design training objectives that anchor decisions to invariant, generalizable features."
  works:
    - title: "Consistency Regularization for Domain Generalization with Logit Attribution Matching"
      venue: "UAI, 2024"
      description: "Logit Attribution Matching (LAM) anchors predictions to domain-invariant causal features."
      paper: "https://proceedings.mlr.press/v244/gao24a.html"
      code: "https://github.com/Gaohan123/LAM"
    - title: "Dual Risk Minimization: Towards Next-Level Robustness in Fine-Tuning Zero-Shot Models"
      venue: "NeurIPS, 2024"
      description: "Combats robustness vanishing during foundation-model fine-tuning via dual risk minimization."
      paper: "https://proceedings.neurips.cc/paper_files/paper/2024/hash/7972f3735e104a54715922aa416fde1b-Abstract-Conference.html"
      code: "https://github.com/vaynexie/DRM"

- title: "Trustworthy and Explainable AI (XAI)"
  summary: "Deep classifiers often rely on spurious correlations rather than causally relevant visual evidence. My work develops explanation methods that diagnose misaligned dependencies and surface discriminative rationales."
  works:
    - title: "ViT-CX: Causal Explanation of Vision Transformers"
      venue: "IJCAI, 2023"
      description: "Estimates the causal effect of semantic patches on Vision Transformer predictions."
      paper: "https://www.ijcai.org/proceedings/2023/174"
      code: "https://github.com/vaynexie/CausalX-ViT"
    - title: "Two-Stage Holistic and Contrastive Explanation of Image Classification"
      venue: "UAI, 2023"
      description: "Introduces CWOX, which explains top-K labels by contrasting visually confusable competitors."
      paper: "https://proceedings.mlr.press/v216/xie23a.html"
      code: "https://github.com/vaynexie/CWOX"
    - title: "Example Perplexity"
      venue: "arXiv:2203.08813, 2022"
      description: "Proposes a diagnostic measure for assessing how well a model captures training-example structure."
      paper: "https://arxiv.org/abs/2203.08813"
