short_bio: >-
  <p>
  <span class="open-to-work-highlight">I plan to graduate in Oct. 2026 and am actively open to discussing industry opportunities
  in multimodal AI, agentic systems,
  and LLM/MLLM training and inference.</span>
  </p>
  <p>
  I am a Ph.D. candidate in the Dept. of Computer Science & Engineering at HKUST, advised by
  <a href="https://www.cse.ust.hk/faculty/lzhang/" target="_blank">Prof. Nevin L. Zhang</a>,
  and a recipient of the Huawei PhD Fellowship (HKUST).
  </p>
  <p>
  My research focuses on the real-world application of deep vision and vision-language models,
  with emphasis on explainability, generalization, MLLM-based agentic visual perception,
  and controllability in image editing.
  </p>
  <p>
  In general, I aim to develop diagnostic tools to understand what models currently depend on, and targeted
  mechanisms to guide them toward causally relevant, trustworthy, and efficient behavior.
  </p>

